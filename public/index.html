<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TSV</title>
  </head>
  <body>
    <div id="slideshow" class="slideshow">
      <div class="slide bg-landing"></div>

      <div id="greeting" class="slide bg-greeting">
        <div id="greetingtext" class="greeting-text">
          Wir begrüßen zum heutigen Heimspiel herzlich den
        </div>
        <div id="opponent" class="opponent-text"></div>
        <div class="team-logo team-logo--left">
          <img src="logo/tsv-bad-griesbach.png" alt="TSV Logo" />
        </div>
        <div class="team-logo team-logo--right">
          <img id="opponentLogo" alt="Gegner Logo" />
        </div>
      </div>

      <!-- Alle Spiele.  -->

      <div style="display: none">
        <div id="fp-widget_root-30ufC8OsKlDm8nB8bAdu6VCJToy"></div>
      </div>

      <!-- Tabelle + torschützen -->
      <div id="ranking" class="slide bg-match">
        <table>
          <tr>
            <td>
              <!-- First column -->
              <div id="fp-widget_root-30ueRUuun8ZlIZ3mrpLYKQoyEuY"></div>
            </td>
            <td>
              <div id="bestscorersDiv"></div>
            </td>
          </tr>
        </table>
      </div>
      <!-- TSV Torschützen-->
      <div id="tsvscorers" class="slide bg-match"></div>

      <div id="beforeSponsors" class="slide bg-sponsor-landing"></div>

      <div id="afterSponsors" class="slide bg-sponsor-landing"></div>

      <div class="slide bg-instagram"></div>
    </div>

    <script src="https://widget-api.fupa.net/vendor/widget.js?v1"></script>

    <script src="slideshow.js"></script>
  </body>
  <footer>
    <a href="impressum.html">Impressum</a>
  </footer>
</html>
